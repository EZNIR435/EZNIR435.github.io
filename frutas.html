    <nav class="navbar">

        <h1>Catálogo de Frutas</h1>

          <input type="text" id="buscador" placeholder="Busca tu fruta (ej: Kitsune)...">

        <div class="filter-container">
          <button class="btn-filter" onclick="filtrarPorRareza('todas')">Todas</button>

          <button class="btn-filter" onclick="filtrarPorRareza('Rara')">Raras</button>

        <div id="lista-frutas" class="container-cards">
            
        </div>
